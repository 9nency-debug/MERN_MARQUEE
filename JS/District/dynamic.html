div{
    width: 200px;

    border-radius: 10px;
    overflow: hidden;
}

img{
    width: 100%;

    object-fit: cover;
    display: block;
}

h2,p{
    margin: 10px;

</body>
<script>
    function createCard(image, title, paragraph) {
    let card=document.createElement("div");
    let img=document.createElement("img");
    let h2=document.createElement("h2");
    let p = document.createElement("p");
    img.setAttribute('src', image);
    h2.innerText = title;
    p.innerText = paragraph;
    card.append(img, h2, p);
    document.body.appendChild(card); 
    console.log(card);
    }
    createCard("https://b.zmtcdn.com/data/edition_assets/17836742758995427.jpg", "Dhamaal 4", "UA13+ | Hindi");
    createCard("https://cdn.district.in/movies-assets/images/cinema/Alpha-062ca980-6ef1-11f1-b0b5-2f04c00aa32d.jpg", "Alpha", "UA16+ | Hindi");
    createCard("https://cdn.district.in/movies-assets/images/cinema/17811549132914624-0667fb20-6dfc-11f1-9a9b-71d1ad62c0c2.jpg", "Welcome to the Jungle","UA16+ | Hindi");
